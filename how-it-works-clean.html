<!doctype html><html lang="hy"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ինչպես է աշխատում</title><style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Armenian:wght@700;900&family=Noto+Sans+Armenian:wght@400;600;700;900&display=swap');
:root{--bg:#fbf7ef;--paper:#fffaf2;--navy:#08294f;--gold:#e1a72f;--muted:#667184;--line:rgba(8,41,79,.12)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--navy);font-family:"Noto Sans Armenian",Arial,sans-serif}.header{height:92px;background:rgba(255,250,242,.96);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 56px}.logo{height:68px}.nav{display:flex;gap:32px;font-weight:900}.nav a{text-decoration:none;color:var(--navy)}.btn{background:var(--gold);color:var(--navy);padding:15px 28px;border-radius:999px;text-decoration:none;font-weight:900}
main{width:min(1500px,calc(100% - 48px));margin:70px auto}.head{text-align:center;margin-bottom:44px}.head h1{font-family:"Noto Serif Armenian";font-size:64px;margin:0}.head span{color:var(--gold);font-weight:900;letter-spacing:.16em}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:26px}.card{background:var(--paper);border:1px solid var(--line);border-radius:34px;padding:26px 22px 34px;text-align:center;min-height:390px;box-shadow:0 18px 45px rgba(8,41,79,.05)}.art{height:190px;border-radius:24px;background:#fff;display:grid;place-items:center;font-size:64px;margin-bottom:26px}.num{width:64px;height:64px;margin:0 auto 22px;border-radius:50%;background:var(--navy);color:white;display:grid;place-items:center;font-weight:900;font-size:22px}.card h2{font-size:24px;line-height:1.45}
@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.nav{display:none}}@media(max-width:650px){.cards{grid-template-columns:1fr}.header{height:auto;padding:14px 20px}.head h1{font-size:42px}}
.how-img{width:min(1500px,calc(100% - 40px));margin:auto}.how-img img{width:100%;display:block;border-radius:24px;box-shadow:0 18px 45px rgba(8,41,79,.06)}
/* V6 approved process cards with separate illustrations */
.how-approved{padding:80px 0}
.process-cards{
  width:min(1500px,calc(100% - 42px));
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:24px;
}
.process-card{
  position:relative;
  background:#fffaf2;
  border:1px solid rgba(8,41,79,.12);
  border-radius:30px;
  min-height:390px;
  padding:22px 22px 32px;
  text-align:center;
  box-shadow:0 18px 45px rgba(8,41,79,.06);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}
.process-card.active{border-color:#e1a72f;box-shadow:0 0 0 2px rgba(225,167,47,.18),0 18px 45px rgba(8,41,79,.06)}
.process-card img{
  width:100%;
  height:190px;
  object-fit:contain;
  object-position:center bottom;
  margin-bottom:18px;
}
.process-card .num{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#08294f;
  color:white;
  display:grid;
  place-items:center;
  font-weight:900;
  font-size:19px;
  margin:0 auto 18px;
}
.process-card .check{
  position:absolute;
  top:24px;
  right:24px;
  width:54px;
  height:54px;
  border-radius:50%;
  background:#e1a72f;
  color:white;
  display:grid;
  place-items:center;
  font-weight:900;
  font-size:28px;
}
.process-card h3{
  font-size:22px;
  line-height:1.45;
  color:#08294f;
  margin:0;
}
@media(max-width:1200px){.process-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.process-cards{grid-template-columns:1fr}.process-card{min-height:330px}}
</style></head><body><header class="header"><a href="index.html"><img class="logo" src="assets/logo.png"></a><nav class="nav"><a href="index.html">Գլխավոր</a><a href="products.html">Ապրանքներ</a><a href="account/index.html">Իմ հաշիվը</a><a href="contact.html">Կապ</a></nav><a class="btn" href="products.html">Պատվիրել</a></header><main><div class="head"><span>ԳՈՐԾԸՆԹԱՑ</span><h1>Ինչպես է աշխատում</h1></div><div class="process-cards"><div class="process-card active"><img src="assets/steps/step-1.png"><div class="check">✓</div><div class="num">01</div><h2>Ընտրում եք<br>ծառայությունը</h2></div><div class="process-card"><img src="assets/steps/step-2.png"><div class="num">02</div><h2>Վերբեռնում եք<br>լուսանկարները</h2></div><div class="process-card"><img src="assets/steps/step-3.png"><div class="num">03</div><h2>Մենք ստեղծում ենք</h2></div><div class="process-card"><img src="assets/steps/step-4.png"><div class="num">04</div><h2>Պատրաստում ենք</h2></div><div class="process-card"><img src="assets/steps/step-5.png"><div class="num">05</div><h2>Ստանում եք պատվերը</h2></div></div></main></body></html>
