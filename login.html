<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Մուտք | Aramazd Art</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html"><img src="assets/logo/aramazd-logo.png" alt="Aramazd Art"></a>
  <nav class="nav"><a href="index.html">Գլխավոր</a><a href="products.html">Ապրանքներ</a><a href="how-it-works.html">Ինչպես է աշխատում</a><a href="contact.html">Կապ</a></nav>
  <div class="actions"><a class="login" href="login.html">Մուտք</a><a class="btn small" href="register.html">Գրանցվել</a></div>
</header>
<main class="auth-page">
  <div class="auth-card">
    <img src="assets/logo/aramazd-logo.png" alt="Aramazd Art" style="width:90px;margin-bottom:10px">
    <h1>Մուտք գործել</h1>
    <p>Մուտք գործեք, որպեսզի շարունակեք պատվերը կամ տեսնեք ձեր անձնական սրահը։</p>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Գաղտնաբառ">
    <button id="authBtn" class="btn" onclick="loginUser()">Մուտք գործել</button>
    <p>Չունե՞ք հաշիվ։ <a id="registerLink" href="register.html">Գրանցվել</a></p>
  </div>
</main>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
const next = new URLSearchParams(location.search).get('next');
if(next) document.getElementById('registerLink').href = 'register.html?next=' + encodeURIComponent(next);
</script>
</body>
</html>
